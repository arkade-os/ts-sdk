name: CI

on:
  workflow_dispatch:
  push:
    branches: [master, next]
  # Run on all pull requests (not just those targeting master/next) so stacked
  # PRs onto feature branches get CI checks too.
  pull_request:

jobs:
  check:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.25.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type-check ts-sdk
        run: pnpm -C packages/ts-sdk run typecheck

      - name: Build
        run: pnpm run build

      - name: Type-check boltz-swap
        run: pnpm -C packages/boltz-swap run typecheck

      - name: Smoke-test ts-sdk dist
        run: pnpm -C packages/ts-sdk run smoke:dist

      - name: Verify ts-sdk publish shape
        run: cd packages/ts-sdk && npm pack --dry-run --ignore-scripts

      - name: Smoke-test boltz-swap dist
        run: pnpm -C packages/boltz-swap run smoke:dist

      - name: Verify boltz-swap publish shape
        run: cd packages/boltz-swap && npm pack --dry-run --ignore-scripts

      - name: Unit tests
        run: pnpm run test:unit

  integration:
    name: Integration (${{ matrix.package }} / ${{ matrix.group }})
    runs-on: ubuntu-latest
    needs: check
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: ts-sdk
            group: ark-core
            test_files: test/e2e/ark.test.ts
          - package: ts-sdk
            group: arkade-assets
            test_files: >-
              test/e2e/asset.test.ts
              test/e2e/arkadeCash.test.ts
              test/e2e/liquidation.test.ts
          - package: ts-sdk
            group: settlement-delegation
            test_files: >-
              test/e2e/settlement.test.ts
              test/e2e/boardingRotation.test.ts
              test/e2e/non-interactive-delegate.test.ts
              test/e2e/contract-params-change.test.ts
              test/e2e/restore.test.ts
              test/e2e/operatorOffline.test.ts
              test/e2e/arkade-script.test.ts
          - package: ts-sdk
            group: exit-providers-rotation
            test_files: >-
              test/e2e/unilateralExit.test.ts
              test/e2e/unilateralExitDeepChain.test.ts
              test/e2e/exitDataCapture.test.ts
              test/e2e/vhtlc.test.ts
              test/e2e/non-interactive-htlc.test.ts
              test/e2e/indexer.test.ts
              test/e2e/electrum.test.ts
              test/e2e/onchain.test.ts
              test/e2e/deprecatedSignerMigration.test.ts
              test/e2e/digestMismatch.test.ts
          - package: boltz-swap
            group: all
            test_files: ""

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          persist-credentials: false

      - uses: pnpm/action-setup@v6
        with:
            version: 10.25.0

      - uses: actions/setup-node@v6
        with:
            node-version-file: ".nvmrc"
            cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build ts-sdk
        run: pnpm -C packages/ts-sdk build

      - name: Make regtest controller executable
        run: chmod +x scripts/regtest.sh

      - name: Start regtest environment
        run: pnpm run regtest:up:${{ matrix.package }}

      - name: Setup test wallets
        run: pnpm run regtest:setup:${{ matrix.package }}

      - name: Run integration tests
        env:
          TEST_FILES: ${{ matrix.test_files }}
        run: |
          if [ -n "$TEST_FILES" ]; then
            pnpm run regtest:test:${{ matrix.package }} $TEST_FILES
          else
            pnpm run regtest:test:${{ matrix.package }}
          fi

      - name: Capture logs on failure
        if: failure()
        run: |
          docker logs arkd 2>&1 || true
          docker logs arkd-wallet 2>&1 || true
          docker logs emulator 2>&1 || true
          docker logs boltz 2>&1 || true
          docker logs boltz-lnd 2>&1 || true
          docker logs boltz-fulmine 2>&1 || true

      - name: Cleanup
        if: always()
        run: pnpm run regtest:reset:${{ matrix.package }}
