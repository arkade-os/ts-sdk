name: CI

on:
  workflow_dispatch:
  push:
    branches: [master, next]
  pull_request:
    branches: [master, next]

jobs:
  check:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.25.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Type-check ts-sdk
        run: pnpm -C packages/ts-sdk run typecheck

      - name: Build
        run: pnpm run build

      - name: Type-check boltz-swap
        run: pnpm -C packages/boltz-swap run typecheck

      - name: Smoke-test ts-sdk dist
        run: pnpm -C packages/ts-sdk run smoke:dist

      - name: Verify ts-sdk publish shape
        run: cd packages/ts-sdk && npm pack --dry-run --ignore-scripts

      - name: Smoke-test boltz-swap dist
        run: pnpm -C packages/boltz-swap run smoke:dist

      - name: Verify boltz-swap publish shape
        run: cd packages/boltz-swap && npm pack --dry-run --ignore-scripts

      - name: Unit tests
        run: pnpm run test:unit

  integration:
    name: Integration (${{ matrix.package }})
    runs-on: ubuntu-latest
    needs: check
    strategy:
      fail-fast: false
      matrix:
        package: [ts-sdk, boltz-swap]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-go@v5
        with:
            go-version: '1.23'

      - uses: actions/cache@v4
        with:
            path: regtest/_build
            key: nigiri-${{ hashFiles('regtest/.env.defaults', '.env.regtest') }}

      - uses: pnpm/action-setup@v4
        with:
            version: 10.25.0

      - uses: actions/setup-node@v4
        with:
            node-version-file: ".nvmrc"
            cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build ts-sdk
        run: pnpm -C packages/ts-sdk build

      - name: Make regtest scripts executable
        run: chmod +x regtest/*.sh regtest/helpers/*.sh scripts/regtest.sh

      - name: Start regtest environment
        run: pnpm run regtest:up:${{ matrix.package }}

      - name: Add nigiri to PATH
        run: echo "${{ github.workspace }}/regtest/_build/nigiri/build" >> $GITHUB_PATH

      - name: Setup test wallets
        run: pnpm run regtest:setup:${{ matrix.package }}

      - name: Run integration tests
        run: pnpm run regtest:test:${{ matrix.package }}

      - name: Capture logs on failure
        if: failure()
        run: |
          docker logs ark 2>&1 || true
          docker logs arkd 2>&1 || true
          docker logs ark-wallet 2>&1 || true
          docker logs arkd-wallet 2>&1 || true
          docker logs introspector 2>&1 || true
          docker logs boltz 2>&1 || true
          docker logs boltz-lnd 2>&1 || true
          docker logs boltz-fulmine 2>&1 || true

      - name: Cleanup
        if: always()
        run: pnpm run regtest:reset:${{ matrix.package }}
