# Emulator service — runs on the nigiri network created by arkade-regtest.
# Start after `./regtest/start-env.sh`:
#
#   docker compose -f docker-compose.emulator.yml up -d
#
name: nigiri
services:
    emulator:
        image: ghcr.io/arkade-os/emulator:v0.0.1
        container_name: emulator
        ports:
            - "7073:7073"
        environment:
            - EMULATOR_NO_TLS=true
            - EMULATOR_SECRET_KEY=b1c2d3e4f5a6b7c8d9e0f1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c4
            - EMULATOR_PORT=7073
            - EMULATOR_LOG_LEVEL=5
            - EMULATOR_ARKD_URL=arkd:7070
        volumes:
            - type: tmpfs
              target: /app/data
        restart: unless-stopped

networks:
    default:
        name: nigiri
        external: true
